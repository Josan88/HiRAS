# Phase 4: Configuration — TinyKAN-HAR Reproduction
# All values are sourced directly from the paper.
# Values marked TODO are NOT stated in the paper and require inference or user direction.
# Values marked INFERRED are inferred from context and should be verified.

# =============================================================================
# GLOBAL SETTINGS
# =============================================================================
global:
  seed: 42                        # Paper states: "fix a global random seed"
  device: cuda                    # Training device (cuda/cpu)
  output_dir: outputs/

# =============================================================================
# DATA CONFIGURATION
# =============================================================================
datasets:
  uci_har:
    name: "UCI Human Activity Recognition Using Smartphones"
    url: "https://archive.ics.uci.edu/dataset/240/human+activity+recognition+using+smartphones"
    download_path: data/uci_har/
    num_subjects: 30
    num_activities: 6
    fs_original: 50               # Hz
    fs_target: 50                 # Hz (resample target)
    window_length: 128            # samples (2.56 s at 50 Hz) [Section 3.2.2]
    window_stride: 64             # T/2 = 50% overlap [Section 3.2.2]
    n_channels: 6                 # 3-axis accelerometer + 3-axis gyroscope
    seen_classes: 4              # WALKING, SITTING, STANDING, LAYING [Section 3.1.1]
    unseen_classes: 2            # WALKING_UPSTAIRS, WALKING_DOWNSTAIRS [Section 3.1.1]
    subject_split:
      train: 17                   # 21 - 4 validation
      val: 4                      # Section 3.1.1
      test: 9                     # Original split [Section 3.1.1]
    preprocessing:
      gravity_cutoff: 0.3         # Hz, low-pass filter cutoff [Section 3.2.3]
      normalize_per_channel: true  # Section 3.2.4
    activities:
      seen: ["WALKING", "SITTING", "STANDING", "LAYING"]
      unseen: ["WALKING_UPSTAIRS", "WALKING_DOWNSTAIRS"]

  wisdm:
    name: "WISDM Smartphone and Smartwatch Activity and Biometrics"
    url: "https://archive.ics.uci.edu/dataset/507/wisdm+smartphone+and+smartwatch+activity+and+biometrics"
    download_path: data/wisdm/
    num_subjects: 51
    num_activities: 18
    fs_original: 20               # Hz
    fs_target: 50                 # Hz (resample target) — INFERRED from paper context
    window_length: 200            # samples (10 s at 20 Hz) [Section 3.1.2]
    window_stride: 100            # T/2 = 50% overlap [Section 3.2.2]
    n_channels: 12               # 4 sensors × 3 axes [Section 3.1.2]
    seen_classes: 14
    unseen_classes: 4            # jogging, walking_upstairs, walking_downstairs, jumping [Section 3.1.2]
    subject_split:
      train: 35
      val: 8
      test: 8                    # [Section 3.1.2]
    activities:
      seen: ["walking", "jogging", "sitting", "standing", "typing", "brushing_teeth",
             "using_stairmaster", "ascending_stairs", "descending_stairs", "lying",
             "dynamic", "static", "walking_walking_walking", "walk_walk_walk"]
             # TODO: Confirm exact 14 seen activity names from paper Section 3.1.2
      unseen: ["jogging", "walking_upstairs", "walking_downstairs", "jumping"]

  pamap2:
    name: "PAMAP2 Physical Activity Monitoring"
    url: "https://archive.ics.uci.edu/dataset/231/pamap2+physical+activity+monitoring"
    download_path: data/pamap2/
    num_subjects: 9
    num_activities: 18
    fs_original: 100             # Hz (IMU), ~9 Hz (HR sensor)
    fs_target: 50                 # Hz (downsampled) [Section 3.1.3]
    window_length: 250           # samples (5 s at 50 Hz) [Section 3.1.3]
    window_stride: 125           # T/2 = 50% overlap [Section 3.2.2]
    n_channels: 28               # 3 IMUs × 9 channels + heart rate [Section 3.1.3]
    seen_classes: 14
    unseen_classes: 4            # running, rope_jumping, vacuum_cleaning, ironing [Section 3.1.3]
    subject_split:
      train: 6
      val: 1
      test: 2                    # [Section 3.1.3]
    preprocessing:
      heart_rate_interpolation: true  # [Section 3.2.5]
      gravity_cutoff: 0.3         # Hz
    activities:
      seen: ["lying", "sitting", "standing", "walking", "running",
             "ascending_stairs", "descending_stairs", "Nordic_walking",
             "playing_soccer", "jumping", "rope_jumping", "vacuum_cleaning",
             "ironing", "rope_jumping", "other"]
             # TODO: Confirm exact 14 seen activity names from paper Section 3.1.3
      unseen: ["running", "rope_jumping", "vacuum_cleaning", "ironing"]

# =============================================================================
# KAN MODEL ARCHITECTURE
# =============================================================================
kan:
  # Architecture dimensions [Section 3.3.3]
  # Input dimension d_0 = T × D (window_length × n_channels from dataset config)
  # d_L = 128 selected as best trade-off [Section 5.6]
  depth: 3                       # L = 3 layers [Section 5.6, Table 7]
  latent_dim: 128                # d_L = 128 [Section 5.6, Table 7]
  width_schedule:                # Pyramidal structure [Section 3.3.3]
    - TODO                       # d_0 = T * D (window_length × n_channels), computed at runtime
    - 256                        # d_1 — INFERRED, not explicitly stated
    - 128                        # d_2 — INFERRED, not explicitly stated
    - 128                        # d_3 = d_L = 128

  # Spline configuration [Section 3.3.2, Eq. 13]
  spline:
    basis: "bspline"             # B-splines [Section 3.3.2]
    order: 3                     # Cubic splines — INFERRED ("cubic B-splines" mentioned in text)
    num_knots: 5                 # K^(l) = 5 — INFERRED, not explicitly stated in paper
    grid_size: 256               # LUT grid size [Section 3.6.3] — INFERRED

  # Initialization [Section 4.2.3, Eq. 41]
  init_strategy: "identity_spline"  # Splines initialized to approximate identity
  weight_init: "xavier"          # Xavier/He for linear weights [Section 4.2.3]

# =============================================================================
# ZSL MODULE
# =============================================================================
zsl:
  # Semantic embedding [Section 3.4.1, Eq. 26]
  embedding_type: "hybrid"       # HYBRID = best performing [Table 8]
  embedding_dim: TODO             # m — NOT specified in paper, depends on ATTR + TEXT concatenation
  temperature: 1.0                # τ in [Eq. 33] — INFERRED, paper mentions but doesn't specify

  # Loss weights [Section 3.4.5, Eq. 37]
  lambda_ZSL: TODO               # λ_ZSL — NOT explicitly stated in paper
  lambda_align: TODO             # λ_align — NOT explicitly stated in paper
  lambda_sem_CE: TODO            # λ_sem-CE — NOT explicitly stated in paper

  # Calibration factor [Section 3.4.7, Eq. 40, Table 5]
  gamma: 0.5                     # Selected on validation set [Section 5.3]
  gamma_sweep: [0.0, 0.25, 0.5, 0.75, 1.0]  # [Table 5]

  # Semantic sources
  semantic:
    attributes:
      description: "Manually defined binary attributes per activity"
      # TODO: Exact attribute vectors NOT provided in paper
    text_embeddings:
      model: TODO                 # e.g., "sentence-transformers/all-MiniLM-L6-v2"
      # TODO: Exact model NOT specified in paper
    hybrid:
      concat: true                # Concatenate ATTR + TEXT [Section 5.7.1]
      projection: true           # Learned linear projection W_sem [Section 3.4.2]

# =============================================================================
# TRAINING HYPERPARAMETERS
# =============================================================================
training:
  # Optimizer [Section 4.2.2]
  optimizer: "Adam"
  learning_rate:
    initial: 0.001                # η_0 ∈ [10^-4, 10^-3] — INFERRED as 10^-3
    schedule: "cosine_annealing"  # [Section 4.2.2 mentions "cosine annealing"]
    min_lr: 0.00001               # TODO — NOT specified

  # Batch and epochs [Section 4.2.2]
  batch_size: 64                 # N_b ∈ {32, 64, 128} — INFERRED as 64
  max_epochs: 150                # E_max ∈ {100, 200} — INFERRED as 150
  early_stopping:
    patience: 20                  # E_patience — INFERRED, not specified
    metric: "macro_f1"            # [Section 4.2.4]

  # Regularization [Section 3.3.5, 4.2.2]
  l2_weight_decay: 0.0001        # λ_lin — INFERRED, not explicitly stated
  smoothness_weight: 0.001       # λ_smooth — INFERRED, not explicitly stated
  dropout: 0.2                   # p_drop — INFERRED, paper mentions range and uses 0.1-0.5 in ablations

  # Gradient clipping
  max_grad_norm: 1.0             # TODO — NOT specified in paper

# =============================================================================
# ABLATION CONFIGURATION (Table 7 variants)
# =============================================================================
ablations:
  table7_variants:
    full_int8:
      depth: 3
      latent_dim: 128
      precision: "int8"
      lut: true
      zsl_losses: true
      calibration: true
      semantic_projection: true
      explainability_regularizer: true
      spline_knots: 5
      pruning: 0

    full_fp32:
      precision: "fp32"
      # rest same as full_int8

    wo_zsl_losses:
      zsl_losses: false

    wo_calibration:
      calibration: false

    wo_semantic_projection:
      semantic_projection: false

    wo_explainability:
      explainability_regularizer: false

    shallow_kan:
      depth: 1
      latent_dim: 64

    deep_kan:
      depth: 4
      latent_dim: 128

    narrow_latent:
      depth: 3
      latent_dim: 64

    wide_latent:
      depth: 3
      latent_dim: 256

    coarse_spline:
      spline_knots: 3            # INFERRED

    fine_spline:
      spline_knots: 8            # INFERRED

    wo_luts:
      lut: false

    quant_no_lut:
      lut: false

    quant_prune_50:
      pruning: 0.5

    quant_prune_70:
      pruning: 0.7

    short_window:
      window_scaling: 0.75       # INFERRED

    long_window:
      window_scaling: 1.25       # INFERRED

    low_dropout:
      dropout: 0.1

    high_dropout:
      dropout: 0.5

# =============================================================================
# TINYML DEPLOYMENT CONFIGURATION
# =============================================================================
tinyml:
  # Target hardware [Section 5.8, Table 10]
  mcu:
    name: "Cortex-M4F"
    flash_kb: 256
    sram_kb: 64
    clock_mhz: 80

  # Quantization [Section 3.6.1]
  quantization:
    weight_bits: 8               # b = 8 (int8)
    activation_bits: 8           # [Section 3.6.1]
    method: "symmetric_uniform"  # [Section 3.6.1, Eq. 42]
    calibration_samples: 1000   # TODO — NOT specified

  # LUT configuration [Section 3.6.3]
  lut:
    grid_points: 256             # Per spline dimension
    interpolation: "linear"       # [Section 3.6.3]
    dtype: "int8"                # Quantized LUT entries

  # Structured pruning [Table 7]
  pruning:
    rates: [0.0, 0.5, 0.7]       # [Table 7 rows 15-16]
    type: "structured_channel"    # Remove entire channels [Section 3.6.1]

  # Expected TinyML metrics (from Table 10, int8 models)
  expected_metrics:
    tinykan_har:
      flash_kb: 145
      ram_kb: 26
      latency_ms: 4.1
      energy_uj: 320
    cnn1d_tiny:
      flash_kb: 120
      ram_kb: 24
      latency_ms: 3.5
      energy_uj: 280
    cnn_lstm_tiny:
      flash_kb: 165
      ram_kb: 30
      latency_ms: 6.1
      energy_uj: 450
    transformer_tiny:
      flash_kb: 210
      ram_kb: 36
      latency_ms: 7.8
      energy_uj: 520

# =============================================================================
# EVALUATION CONFIGURATION
# =============================================================================
evaluation:
  # Metrics computed on seen classes [Section 4.3.1]
  har_metrics:
    - accuracy
    - precision_macro
    - recall_macro
    - f1_macro
    - precision_micro
    - recall_micro
    - f1_micro

  # ZSL metrics [Section 4.3.2]
  zsl_metrics:
    - acc_zsl           # Pure ZSL accuracy on unseen classes
    - acc_seen          # gZSL accuracy on seen classes
    - acc_unseen        # gZSL accuracy on unseen classes
    - harmonic_mean     # H = 2*acc_seen*acc_unseen / (acc_seen + acc_unseen)

  # Statistical testing [Section 5.4]
  statistical:
    num_seeds: 5        # [Section 5.4: "five runs"]
    test_type: "paired_two_sided_ttest"
    alpha: 0.01         # Significance level

# =============================================================================
# EXPLAINABILITY CONFIGURATION
# =============================================================================
explainability:
  # Gradient attribution [Section 3.5.1]
  gradient:
    method: "gradient_times_input"  # [Section 3.5.1]
    normalize: true

  # SHAP approximation [Section 3.5.4]
  shap:
    n_samples: 1000     # TODO — NOT specified
    background_samples: 100  # TODO — NOT specified

  # Spline visualization [Section 3.5.5]
  spline:
    plot_derivative: true
    u_range_samples: 100    # Number of points to plot per spline

  # Case studies [Section 5.5, Table 11]
  case_study_activities:
    - "walking"
    - "sitting"
    - "ascending_stairs"
    - "lying"
    - "running"

# =============================================================================
# VISUALIZATION FIGURES TO REPRODUCE
# =============================================================================
figures:
  figure2:
    description: "Sensitivity of pure zero-shot accuracy Acc_ZSL and harmonic mean H to calibration factor γ"
    type: "line_plot"
    x: "gamma"
    y: ["Acc_ZSL", "H"]
    xrange: [0.0, 1.0]
    # Data from Table 5

  figure3:
    description: "Local explainability for walking, sitting, ascending stairs"
    panels:
      - "attribution_heatmap"    # T × D heatmap
      - "sensor_relevance_bar"  # Per-channel bar plot
      - "temporal_relevance_curve"  # Per-time-step curve
    datasets: [uci_har]

  figure4:
    description: "Learned univariate KAN functions and class-wise activations"
    panels:
      - "spline_functions"       # phi_j(u) plots per layer
      - "mean_activations"       # xbar_j,c for selected classes

# =============================================================================
# EXPERIMENT ORDERS
# =============================================================================
experiment_order:
  - exp0_data              # Data download and preprocessing
  - exp1_har_performance   # Table 3
  - exp2_zsl               # Table 4
  - exp3_gamma_robustness  # Table 5, Figure 2
  - exp4_statistical       # Table 6
  - exp5_ablations         # Tables 7, 8, 9
  - exp6_tinyml            # Table 10
  - exp7_viz               # Figures 3, 4
  - exp8_depth_width       # Section 5.6
