# HiRAS Phase 4: Configuration
# Adaptive Pruning for Neural Networks

# NOTE: Values marked # PAPER are explicitly stated in the paper.
# Values marked # INFERRED are reasonable defaults not explicitly specified.
# Values marked # UNKNOWN require clarification from paper authors.

# =============================================================================
# MODEL ARCHITECTURES
# =============================================================================

models:
  resnet20:
    type: resnet
    depth: 20
    dataset: cifar10
    # Paper: ResNet-20 adapted for CIFAR (no max-pool, 3 stages)
    num_classes: 10
    base_channels: 64  # INFERRED from standard ResNet-20

  resnet20_cifar100:
    type: resnet
    depth: 20
    dataset: cifar100
    num_classes: 100

  resnet50:
    type: resnet
    depth: 50
    dataset: imagenet
    num_classes: 1000
    # PAPER: Standard ResNet-50 for ImageNet

  vgg16:
    type: vgg
    depth: 16
    dataset: cifar10
    num_classes: 10
    # PAPER: VGG-16 adapted for CIFAR

# =============================================================================
# DATASETS
# =============================================================================

datasets:
  cifar10:
    name: CIFAR-10
    root: ./data/cifar10
    num_classes: 10
    image_size: 32
    normalization:
      mean: [0.4914, 0.4822, 0.4465]  # PAPER: standard CIFAR normalization
      std: [0.2470, 0.2435, 0.2616]
    augmentation:
      random_crop: true
      random_flip: true
      padding: 4  # PAPER: standard CIFAR augmentation

  cifar100:
    name: CIFAR-100
    root: ./data/cifar100
    num_classes: 100
    image_size: 32
    normalization:
      mean: [0.4914, 0.4822, 0.4465]
      std: [0.2470, 0.2435, 0.2616]
    augmentation:
      random_crop: true
      random_flip: true
      padding: 4

  imagenet:
    name: ImageNet
    root: ./data/imagenet
    num_classes: 1000
    image_size: 224  # PAPER: standard ImageNet crop size
    resize_size: 256
    normalization:
      mean: [0.485, 0.456, 0.406]  # PAPER: ImageNet normalization
      std: [0.229, 0.224, 0.225]

# =============================================================================
# TRAINING HYPERPARAMETERS
# =============================================================================

training:
  optimizer:
    type: SGD  # PAPER: standard for CIFAR/ImageNet training
    lr: 0.1  # PAPER: standard initial LR
    momentum: 0.9  # PAPER: standard momentum
    weight_decay: 0.0005  # PAPER: 5e-4 weight decay
    nesterov: true  # INFERRED: typically enabled with SGD

  batch_size: 256  # PAPER: batch size of 256

  scheduler:
    type: cosine_annealing  # PAPER: cosine annealing schedule
    # T_peak and T_end inferred from epochs
    min_lr: 0.0  # PAPER: cosine annealing to 0

  epochs:
    cifar10: 150  # PAPER: CIFAR training for 150 epochs
    cifar100: 150  # INFERRED: same as CIFAR-10
    imagenet: 90  # PAPER: ImageNet for 90 epochs (standard)

  warmup_epochs: 0  # INFERRED: not mentioned in paper
  label_smoothing: 0.0  # INFERRED: not mentioned in paper

# =============================================================================
# PRUNING HYPERPARAMETERS
# =============================================================================

pruning:
  # Adaptive pruning (proposed method)
  adaptive:
    initial_sparsity: 0.0  # PAPER: start at 0%
    target_sparsity: 0.8  # PAPER: target 80% sparsity
    adjustment_interval: 5  # PAPER: sparsity adjusted every 5 epochs
    adjustment_step: 0.05  # INFERRED: 5% increment per adjustment
    recovery_interval: 20  # PAPER: recovery phase every 20 epochs
    recovery_epochs: 10  # PAPER: 10 epoch recovery phase

  # Static (one-shot) pruning baseline
  static:
    target_sparsity: 0.8  # PAPER: baseline comparison at 80%

  # Gradual magnitude pruning (GMP) baseline
  gradual:
    start_epoch: 0  # PAPER: start pruning from epoch 0
    end_epoch: 150  # PAPER: end at epoch 150
    target_sparsity: 0.8
    schedule_type: polynomial  # INFERRED: polynomial decay assumed

  # Lottery ticket hypothesis baseline
  lottery_ticket:
    rewind_epoch: 5  # PAPER: rewind to epoch 5 weights
    target_sparsity: 0.8
    pruning_interval: 5  # INFERRED: prune every 5 epochs

  # Sparsity targets for ablation (Category C)
  sparsity_targets: [0.5, 0.6, 0.7, 0.8, 0.9]  # PAPER: tested 50-90%

  # Pruning schedule variants for ablation (Category B)
  schedule_variants:
    - constant_rate
    - exponential_decay
    - polynomial_decay
    - step_function

  # Recovery phase variants for ablation (Category D)
  recovery_variants:
    - none
    - every_20_epochs
    - every_30_epochs
    - every_10_epochs

# =============================================================================
# EVALUATION METRICS
# =============================================================================

evaluation:
  metrics:
    - accuracy_top1
    - accuracy_top5
    - flops_reduction
    - parameter_reduction
    - sparsity_final

  flops:
    baseline_resnet20: 0.28e9  # INFERRED: ~0.28B FLOPs for ResNet-20
    baseline_resnet50: 4.1e9  # PAPER: ResNet-50 is 4.1B FLOPs
    baseline_vgg16: 0.61e9  # INFERRED: VGG-16 is ~0.61B FLOPs

  topk: [1, 5]  # PAPER: top-1 and top-5 accuracy

# =============================================================================
# DEPLOYMENT (Jetson Nano)
# =============================================================================

deployment:
  device: jetson_nano
  runtime: tensorrt

  tensorrt:
    precision: fp16  # INFERRED: FP16 for Jetson Nano (not explicitly stated)
    workspace_size: 1024  # INFERRED: 1GB workspace
    max_batch_size: 32

  benchmark:
    batch_sizes: [1, 8, 32]
    num_warmup_runs: 100
    num_timing_runs: 1000
    input_shape: [3, 224, 224]  # PAPER: ImageNet input size

# =============================================================================
# EXPERIMENT CONFIGURATION
# =============================================================================

experiments:
  main_comparison:
    methods:
      - adaptive
      - static
      - gradual
      - lottery_ticket
    datasets:
      - cifar10
      - cifar100
      - imagenet
    seeds: [42, 7, 123]  # INFERRED: 3-seed evaluation

  ablation_schedule:
    dataset: cifar10
    model: resnet20
    schedules: [constant, exponential, polynomial, step]
    sparsity_target: 0.7
    seeds: [42]

  ablation_sparsity:
    datasets: [cifar10, cifar100, imagenet]
    sparsity_targets: [0.5, 0.6, 0.7, 0.8, 0.9]
    seeds: [42]

  ablation_recovery:
    dataset: cifar10
    model: resnet20
    recovery_intervals: [0, 10, 20, 30]  # 0 = no recovery
    recovery_length: 10  # PAPER: 10 epoch recovery
    sparsity_target: 0.7
    seeds: [42]

# =============================================================================
# LOGGING AND CHECKPOINTING
# =============================================================================

logging:
  wandb:
    project: adaptive-pruning
    entity: null  # Set to your wandb team
    log_interval: 100  # PAPER: log every 100 steps

  tensorboard:
    log_dir: ./logs

  checkpoint:
    save_interval: 30  # INFERRED: save every 30 epochs
    save_best: true
    save_last: true

# =============================================================================
# PATHS
# =============================================================================

paths:
  data_root: ./data
  checkpoint_root: ./checkpoints
  output_root: ./outputs
  log_root: ./logs