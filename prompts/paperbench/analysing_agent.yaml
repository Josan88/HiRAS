managed_agent:
  task: |-
    {{task}}
    
    Some other agents have already done some work for you.

    Now, You will receive the following files:
    - paper.md & addendum.md: the target paper to reproduce and its addendum
    - plan.md: a high-level experiment plan
    - architecture.md: the system design architecture
    - dependency.md: the analysis of dependencies for different components in the system
    - config.yaml: the configuration file for the experiment

    These files are in the current directory. 
    The read_file tool is available to read these files. 
    Also, you should use print() to print the contents of the files to explicitly READ them.
    You MUST read all the files COMPLETELY. DO NOT truncate the files.
    You can read them in different steps, but you MUST read them COMPLETELY.
    After reading all the files, you can start to analyse the components.

    You should refer to their contents to conclude all the components you need to analyse.
    Please save all the components you need to analyse to analysis/components.txt and then analyse each component one by one.

    Your task is to conduct a comprehensive logic analysis to accurately reproduce the experiments and methodologies described in the research paper. 
    This analysis must align precisely with the paper's methodology, experimental setup, and evaluation criteria.
    Specifically, you should create a analysis file for each .py component mentioned in the architecture.md.
    The analysis file should be named as the <component_name>.py_analysis.md, and should be created under the directory analysis/. For example, if the component is named "main.py", the analysis file should be saved to "analysis/main.py_analysis.md".
    The analysis file should be a comprehensive analysis of the component, including the following sections:
    - Introduction: a brief introduction of the component
    - Implementation: a step-by-step analysis of the implementation of the component
    - Notes: any notes or comments about the implementation and interactions with other components

    1. Align with the Paper: Your analysis must strictly follow the methods, datasets, model configurations, hyperparameters, and experimental setups described in the paper.
    2. Be Clear and Structured: Present your analysis in a logical, well-organized, and actionable format that is easy to follow and implement.
    3. Prioritize Efficiency: Optimize the analysis for clarity and practical implementation while ensuring fidelity to the original experiments.
    4. Follow design: YOU MUST FOLLOW "Data structures and interfaces". DONT CHANGE ANY DESIGN. Do not use public member functions that do not exist in your design.
    5. REFER TO CONFIGURATION: Always reference settings from the config.yaml file. Do not invent or assume any values—only use configurations explicitly provided.
    6. Correctly Save: You MUST save the analysis files to analysis/<component_name>.py_analysis.md

    ## Instruction
    Conduct a Logic Analysis to assist in writing the code, based on the paper, the plan, the design, the task and the previously specified configuration file (config.yaml). 
    You DON'T need to provide the actual code yet; focus on a thorough, clear analysis.

    You should read the files carefully and then analyse each mentioned components in the following steps.
    Analyse ONLY ONE component in one step, and use the write_file tool to save the analysis result to analysis/<component_name>_analysis.md.
    You don't need to create the analysis directory, the write_file tool will automatically create it when saving the file.
    Remember to read the files that have been generated by other agents COMPLETELY.
    Also, you should check which components are already analysed and which are not.

    If there are anything not clear or incorrect in the design, you should report to the manager to ask the planning agents to correct them.
    You MUST make sure every component is analysed and saved to analysis/<component_name>_analysis.md.
    The analysis should be as detailed and comprehensive as possible, and should be able to be used to implement the component.
    The final_answer tool should ONLY be used when EVERY component is analysed, and the files are saved successfully.
  report: |-
    Here is the report from your managed agent '{{name}}':
    {{final_answer}}
    Please check the analysis files that the agents have generated and make sure that they are complete and detailed.
    If the result is not satisfactory, you can ask the planning agent to try again.
    You should make sure all components are analysed.
    If any analysis file is missing or not complete, you should ask the planning agent to analyse the missing components.
    Otherwise, you can proceed to the coding.
final_answer:
  pre_messages: |-
    An agent tried to answer a user query but it got stuck and failed to do so. You are tasked with providing an answer instead. Here is the agent's memory:
  post_messages: |-
    Based on the above, please provide an answer to the following user task:
    {{task}}
