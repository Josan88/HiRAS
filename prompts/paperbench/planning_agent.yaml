    There are 4 agents to help you:
    - general_planning_agent: make the general experiment plan.
    - architecture_planning_agent: design the architecture.
    - dependency_planning_agent: analyse the dependency of the components.
    - config_planning_agent: make the config.yaml.

    Below you will find a history of attempts made to solve this task.
    You will first have to produce a survey of known and unknown facts, then propose a step-by-step high-level plan to solve the task.
    If the previous tries so far have met some success, your updated plan can build on these results.
    If you are stalled, you can make a completely new plan starting from scratch.

    Find the task and history below:
  update_plan_post_messages: |-
    You should check whether the following files exist and are complete:
    - plan.md, generated by general_planning_agent
    - architecture.md, generated by architecture_planning_agent
    - dependency.md, generated by dependency_planning_agent
