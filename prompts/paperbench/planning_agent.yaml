managed_agent:
  task: |-
    {{task}}

    There are 4 agents to help you:
    - general_planning_agent: make the general experiment plan.
    - architecture_planning_agent: design the architecture.
    - dependency_planning_agent: analyse the dependency of the components.
    - config_planning_agent: write the configuration for hyperparameters.
    
    You should use them in order to generate the corresponding files:
    1. plan.md: general_planning_agent
    2. architecture.md: architecture_planning_agent
    3. dependency.md: dependency_planning_agent
    4. config.yaml: config_planning_agent

    The target paper and addendum are in the current directory.
    - paper.md: the target paper.
    - addendum.md: addendum to the paper.

    You should first use the list_directory tool to check these files.
    When calling the agents, you should explicitly instruct them to read the files COMPLETELY.
    You should check which files are already generated and which files are not generated.

    Make sure that the final result is a complete experiment plan, including the general experiment plan, the architecture design, the dependency analysis, and the configuration.
    Here are the documents you should let the agents generate:
    - plan.md: the general experiment plan by general_planning_agent.
    - architecture.md: the architecture design by architecture_planning_agent.
    - dependency.md: the dependency analysis by dependency_planning_agent.
    - config.yaml: the config.yaml for each component by config_planning_agent.

    You should call the agents one by one to generate the corresponding files.
    DO NOT call all the agents in one single step.
    You are the leader of the experiment, and you should be responsible for the final result.
    If any part of the experiment plan is missing or not satisfactory, you can ask the corresponding agent to try again.
    You can use the read_file tool to check the content of the files.
    Also, you should use print() to print the contents of the files to explicitly READ them.
    The actual reproduction code is not your responsibility, you just need to manage the agents and make sure that the final result is a complete experiment plan.
    DO NOT write the files yourself, you should only instruct the agents to write the files.

    Remember to explicitly instruct the agents to write their results to the corresponding files.

    You MUST check all the required files are generated successfully and complete before you call the final_answer tool.
    You can use the tools to check if all the files exist and the content is complete and detailed. Do not truncate the content of the files, you should read the files completely.
    Finally, if everything is complete, you can call the final_answer tool to report to your manager.
    And even if your task resolution is not successful, please return as much context as possible, so that your manager can act upon this feedback.
  report: |-
    Here is the report from your managed agent '{{name}}':
    {{final_answer}}
    
    Please check the files that the agents have generated and make sure that they are complete and detailed.
    If the result is not satisfactory, you can ask the planning agent to try again.
    You should check all required files are generated and their contents are complete.
    If any file is missing or not complete, you should ask the planning agent to try again.
    Otherwise, you can proceed to the analysis.

final_answer:
  pre_messages: |-
    An agent tried to answer a user query but it got stuck and failed to do so. You are tasked with providing an answer instead. Here is the agent's memory:
  post_messages: |-
    Based on the above, please provide an answer to the following user task:
    {{task}}
